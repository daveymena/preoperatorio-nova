# EasyPanel Configuration for Preoperacional Nova
# Deploy: https://easypanel.io

services:
  preoperacional-nova:
    source:
      type: git
      repo: https://github.com/daveymena/preoperatorio-nova.git
      branch: main
      path: preoperacional-saas
    
    build:
      dockerfile: Dockerfile
      context: .
    
    ports:
      - 3000:3000
    
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:6715320Dvd.@postgres:5432/exnova?sslmode=disable}
      - NEXT_PUBLIC_API_URL=${API_URL:-https://preoperacional.conectartv.com}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    
    healthCheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', (r) => {process.exit(r.statusCode===200?0:1)})\""]
      interval: 30s
      timeout: 10s
      retries: 3
      startPeriod: 40s
    
    restart: always
    
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-6715320Dvd.}
      - POSTGRES_DB=${DB_NAME:-exnova}
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    restart: always

volumes:
  postgres_data:
